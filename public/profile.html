<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - pitchmasters.club</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="/" class="brand-logo">Pitch///asters</a>
        <p class="tagline">Re-pitch your hackathon projects. Get real feedback.</p>
        <div id="auth-section"></div>
        <nav class="header-nav">
          <a href="/profile">Profile</a>
        </nav>
      </div>
    </div>
  </header>

  <main id="profile-main" class="container">
    <section id="profile-header">
      <div class="profile-avatar">
        <img id="user-avatar" src="https://github.com/ghost.png" alt="Profile">
      </div>
      <div class="profile-info">
        <h2 id="user-name">Loading...</h2>
        <p id="user-username" class="username"></p>
        <p id="user-bio" class="bio"></p>
      </div>
    </section>

    <section id="user-projects-section">
      <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">My Projects</h3>
        <a href="/edit" class="btn btn-primary">+ New Pitch</a>
      </div>
      <div id="projects-list"></div>
    </section>
  </main>

  <script src="/profile.js"></script>
</body>
</html>
