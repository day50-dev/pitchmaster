<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Pitch///asters</title>
  
  <!-- Open Graph / Social Media Tags -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Pitch///asters">
  <meta property="og:title" content="Profile - Pitch///asters">
  <meta property="og:description" content="View my hackathon projects and pitches.">
  <meta property="og:image" content="https://pitchmasters.club/og-image.png">
  <meta property="og:url" content="https://pitchmasters.club/profile">
  <meta name="twitter:card" content="summary_large_image">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="/" class="brand-logo">Pitch///asters</a>
        <p class="tagline">Re-pitch your hackathon projects. Get real feedback.</p>
        <form action="/search" method="GET" class="header-search">
          <div class="input-group">
            <input type="text" name="q" placeholder="Search projects, events, users..." class="search-input">
            <button type="submit" class="btn btn-search" aria-label="Search">
              <span class="search-icon">🔍</span>
            </button>
          </div>
        </form>
        <nav class="header-nav">
          <a href="/notifications" class="nav-notification">
            <i class="bi bi-bell"></i>
            <span class="notification-badge hidden">0</span>
          </a>
          <div class="user-dropdown">
            <button class="user-dropdown-toggle">
              <img src="https://github.com/ghost.png" alt="User" class="user-avatar-small">
              <span class="user-name">User</span>
              <span class="dropdown-arrow">▼</span>
            </button>
            <div class="user-dropdown-menu hidden">
              <a href="/profile" class="dropdown-item">
                <span class="dropdown-icon">👤</span>
                My Profile
              </a>
              <a href="/settings" class="dropdown-item">
                <span class="dropdown-icon">⚙️</span>
                Settings
              </a>
              <div class="dropdown-divider"></div>
              <a href="#" class="dropdown-item logout-btn">
                <span class="dropdown-icon">🚪</span>
                Logout
              </a>
            </div>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <main id="profile-main" class="container">
    <section id="profile-header">
      <div class="profile-avatar">
        <img id="user-avatar" src="https://github.com/ghost.png" alt="Profile">
      </div>
      <div class="profile-info">
        <h2 id="user-name">Loading...</h2>
        <p id="user-username" class="username"></p>
        <p id="user-bio" class="bio"></p>
      </div>
    </section>

    <section id="my-events-section">
      <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">My Events</h3>
      </div>
      <div id="events-list"></div>
    </section>

    <section id="attempts-section">
      <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">My Attempts</h3>
      </div>
      <div id="attempts-list"></div>
    </section>

    <section id="user-projects-section">
      <div class="section-header d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">My Projects</h3>
        <a href="/edit" class="btn btn-primary">+ New Pitch</a>
      </div>
      <div id="projects-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-copyright">
        &copy; <span id="current-year"></span> <a href="https://day50.dev" target="_blank" rel="noopener">DAY50, Inc</a>
      </p>
      <div class="footer-links">
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
        <a href="https://github.com/day50-dev/pitchmaster" target="_blank" rel="noopener">MIT License</a>
      </div>
      <p class="footer-copyright">
        &copy; <span id="current-year"></span> <a href="https://day50.dev" target="_blank" rel="noopener">DAY50, Inc</a>
      </p>
    </div>
  </footer>

  <script>
    document.getElementById('current-year')?.textContent = new Date().getFullYear();
  </script>
  <script src="/profile.js"></script>
</body>
</html>
